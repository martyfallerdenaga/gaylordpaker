<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quiz Page</title>

<style>
body{
    margin:0;
    font-family: Arial;
    display:flex;
}

/* SIDEBAR */
.sidebar{
    width:220px;
    height:100vh;
    background:#0f172a;
    color:white;
    padding:20px;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    margin:10px 0;
    padding:10px;
}

.sidebar a:hover{
    background:#1e293b;
}

/* MAIN */
.main{
    flex:1;
    padding:30px;
}

/* CARD */
.card{
    background:#e0f2fe;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
}

/* UPLOAD BOX */
.upload-box{
    border:2px dashed #0284c7;
    padding:20px;
    text-align:center;
}

/* ACTIVITY */
.activity{
    background:#bae6fd;
    padding:10px;
    margin-top:10px;
    border-radius:5px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>Menu</h2>
    <a href="index.html">Home</a>
    <a href="activity.html">Activities</a>
</div>

<!-- MAIN -->
<div class="main">

    <!-- QUIZZES -->
    <div class="card">
        <h2>Quizzes</h2>
        <div class="upload-box">
            <input type="file"><br><br>
            <button>Upload Quiz</button>
        </div>
    </div>

    <!-- EXAMS -->
    <div class="card">
        <h2>Exams</h2>
        <div class="upload-box">
            <input type="file"><br><br>
            <button>Upload Exam</button>
        </div>
    </div>

    <!-- ACTIVITIES -->
    <div class="card">
        <h2>Activities</h2>

        <div class="activity">Activity 1</div>
        <div class="activity">Activity 2</div>
        <div class="activity">Activity 3</div>
        <div class="activity">Activity 4</div>

    </div>

</div>

</body>
</html>
