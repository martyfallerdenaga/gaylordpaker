<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quiz Page</title>

<style>
body{
    margin:0;
    font-family: Arial;
    display:flex;
}

.sidebar{
    width:220px;
    height:100vh;
    background:#0f172a;
    color:white;
    padding:20px;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    margin:10px 0;
    padding:10px;
}

.sidebar a:hover{
    background:#1e293b;
}

.main{
    flex:1;
    padding:30px;
}

.card{
    background:#e0f2fe;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
}

.upload-box{
    border:2px dashed #0284c7;
    padding:20px;
    text-align:center;
}

.activity{
    background:#bae6fd;
    padding:10px;
    margin-top:10px;
    border-radius:5px;
}

.preview-img{
    width:120px;
    margin-top:10px;
    border-radius:5px;
}

button{
    padding:6px 12px;
    background:#0284c7;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.link-btn{
    display:inline-block;
    padding:10px 15px;
    background:#0f172a;
    color:white;
    text-decoration:none;
    border-radius:5px;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="sidebar">
    <h2>Menu</h2>
    <a href="index.html">Home</a>
    <a href="activity.html">Activities</a>
</div>

<div class="main">

    <div class="card">
        <h2>Quizzes</h2>
        <div class="upload-box">
            <input type="file" id="quizUpload"><br><br>
            <img id="quizTemp" class="preview-img" style="display:none;"><br>
            <input type="number" id="quizScore" placeholder="Score"><br><br>
            <button onclick="quizAdd()">Submit</button>
        </div>

        <div id="quizPreview"></div>
    </div>

    <div class="card">
        <h2>Exams</h2>
        <div class="upload-box">
            <input type="file" id="examUpload"><br><br>
            <img id="examTemp" class="preview-img" style="display:none;"><br>
            <input type="number" id="examScore" placeholder="Score"><br><br>
            <button onclick="examAdd()">Submit</button>
        </div>

        <div id="examPreview"></div>
    </div>

    

    <div class="card">
        <p>Calculator</p>

        <a href="https://www.google.com" target="_blank" class="link-btn">
            Go to Website
        </a>
    </div>

</div>

<script>
document.getElementById("quizUpload").onchange = e=>{
    const file = e.target.files[0];
    if(file){
        const reader = new FileReader();
        reader.onload = ev=>{
            const img = document.getElementById("quizTemp");
            img.src = ev.target.result;
            img.style.display="block";
        }
        reader.readAsDataURL(file);
    }
};

document.getElementById("examUpload").onchange = e=>{
    const file = e.target.files[0];
    if(file){
        const reader = new FileReader();
        reader.onload = ev=>{
            const img = document.getElementById("examTemp");
            img.src = ev.target.result;
            img.style.display="block";
        }
        reader.readAsDataURL(file);
    }
};

function setup(type){
    const upload = document.getElementById(type+"Upload");
    const scoreInput = document.getElementById(type+"Score");
    const preview = document.getElementById(type+"Preview");

    function display(data){
        preview.innerHTML="";

        data.forEach((item,i)=>{
            const div=document.createElement("div");
            div.classList.add("activity");

            div.innerHTML=`
            <img src="${item.img}" class="preview-img"><br>
            Score: ${item.score}<br>
            <button onclick="${type}Delete(${i})">Delete</button>
            `;

            preview.appendChild(div);
        });
    }

    window[type+"Add"]=function(){
        const file = upload.files[0];
        const score = parseFloat(scoreInput.value);

        if(!file || isNaN(score)){
            alert("Upload + score!");
            return;
        }

        const reader = new FileReader();
        reader.onload=function(e){
            let data=JSON.parse(localStorage.getItem(type))||[];

            data.push({img:e.target.result,score:score});
            localStorage.setItem(type,JSON.stringify(data));

            display(data);
            scoreInput.value="";
            upload.value="";
            document.getElementById(type+"Temp").style.display="none";
        }
        reader.readAsDataURL(file);
    }

    window[type+"Delete"]=function(i){
        let data=JSON.parse(localStorage.getItem(type))||[];
        data.splice(i,1);
        localStorage.setItem(type,JSON.stringify(data));
        display(data);
    }

    let saved=JSON.parse(localStorage.getItem(type))||[];
    display(saved);
}

setup("quiz");
setup("exam");
</script>

</body>
</html>
